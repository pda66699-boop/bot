config:
  min_exact_score: 0.60
  transition_margin: 0.03
  mixed_margin: 0.03
  exact_margin: 0.03
  low_fit_threshold: 0.55
  exact_confidence_min: 60
  confidence_floor_for_history: 65
  history_window: 5
  contradiction_threshold: 0.58
  family_exact_threshold: 0.58
  family_mixed_margin: 0.05
  family_rules:
    growth:
      hard_gates:
        - {type: cluster_min, cluster: immaturity, value: 0.30}
        - {type: cluster_max, cluster: aging, value: 0.52}
    prime:
      hard_gates:
        - {type: cluster_min, cluster: execution, value: 0.55}
        - {type: cluster_min, cluster: administration, value: 0.55}
        - {type: cluster_min, cluster: entrepreneurship, value: 0.48}
        - {type: cluster_min, cluster: integration, value: 0.40}
        - {type: cluster_max, cluster: aging, value: 0.40}
    aging:
      hard_gates:
        - {type: cluster_min, cluster: aging, value: 0.30}
        - {type: cluster_min, cluster: administration, value: 0.45}
        - {type: cluster_max, cluster: immaturity, value: 0.55}

stages:
  - id: "Младенчество"
    label: "Младенчество"
    order: 1
    family: growth
    hard_gates:
      - {type: cluster_max, cluster: administration, value: 0.52}
      - {type: cluster_min, cluster: immaturity, value: 0.48}
      - {type: trait_max, trait: form_over_function, value: 0.35}
    soft_signals:
      chaos: 1.4
      weak_formalization: 1.4
      founder_dependency: 1.0
      founder_centricity: 1.2
      cash_discipline: -0.8
    anti_signals:
      form_over_function: 1.5
      political_behavior: 1.2
      initiative_decay: 1.0
    cluster_ranges:
      execution: [0.30, 0.62]
      administration: [0.00, 0.52]
      entrepreneurship: [0.28, 0.68]
      integration: [0.00, 0.48]
      aging: [0.00, 0.28]
      immaturity: [0.48, 1.00]
    normal_problems:
      - "Нехватка регулярного управленческого ритма и опоры на систему."
      - "Высокая зависимость от ручного координирования и героизма."
      - "Роли и правила ещё только складываются."
    abnormal_problems:
      - "Системные кассовые провалы и срывы обязательств."
      - "Потеря фокуса на клиентской ценности из-за хаотичных решений."
    what_to_do:
      - "Стабилизировать базовое исполнение обязательств перед клиентом."
      - "Ввести минимальный финансовый и операционный контроль."
      - "Закрепить владельцев ключевых решений и процессов."
    what_not_to_do:
      - "Не масштабировать хаос дополнительными продажами и расходами."
      - "Не строить бизнес на постоянном подвиге отдельных людей."

  - id: "Давай-давай"
    label: "Давай-давай"
    order: 2
    family: growth
    hard_gates:
      - {type: cluster_min, cluster: execution, value: 0.55}
      - {type: cluster_min, cluster: entrepreneurship, value: 0.45}
      - {type: cluster_max, cluster: integration, value: 0.60}
    soft_signals:
      overextension: 1.4
      chaos: 1.2
      opportunity_filtering: -1.0
      resource_planning: -1.0
      founder_dependency: 0.7
    anti_signals:
      form_over_function: 1.2
      initiative_decay: 1.0
      political_behavior: 1.0
    cluster_ranges:
      execution: [0.55, 0.90]
      administration: [0.20, 0.62]
      entrepreneurship: [0.55, 1.00]
      integration: [0.15, 0.62]
      aging: [0.00, 0.25]
      immaturity: [0.35, 0.92]
    normal_problems:
      - "Продажи и инициативы растут быстрее, чем система успевает собраться."
      - "Команда перегружается, а ограничения мощности учитываются слабо."
      - "Основатель или центр принятия решений становится узким горлом."
    abnormal_problems:
      - "Качество и маржа системно разрушаются из-за переобещаний."
      - "Организация теряет управляемость при внешнем росте."
    what_to_do:
      - "Ограничить непрофильные инициативы и ввести фильтр возможностей."
      - "Подтянуть ресурсное планирование и план-факт контур."
      - "Снизить зависимость от единственного центра принятия решений."
    what_not_to_do:
      - "Не лечить перегруз только наймом без перестройки управления."
      - "Не брать всё, что можно продать, без учёта исполнения."

