      - {type: trait_min, trait: role_clarity, value: 0.42}
      - {type: cluster_range, cluster: integration, min: 0.28, max: 0.62}
      - {type: cluster_max, cluster: aging, value: 0.32}
      - {type: trait_max, trait: form_over_function, value: 0.40}
      - {type: trait_max, trait: initiative_decay, value: 0.45}
