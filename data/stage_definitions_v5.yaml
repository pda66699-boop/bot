      - "Процедуры начинают жить отдельно от результата."
    what_to_do:
      - "Формализовать полномочия, зоны ответственности и ритм управления."
      - "Свести стратегию, KPI и бюджеты в единый контур."
      - "Подтянуть интеграцию между функциями без потери темпа."
    what_not_to_do:
      - "Не умножать комитеты без управленческого эффекта."
      - "Не возвращаться в ручной режим при первых конфликтах."

