config:
  transition_delta: 8
  hybrid_delta: 6
  regress_confidence_min: 65

stages:
  - id: "Младенчество"
    order: 1
    next_stage: "Давай-давай"
    admissibility:
      P: {min: 60}
      A: {max: 59}
      E: {max: 59}
      I: {max: 59}
    target: {P: 75, A: 35, E: 35, I: 35}
    description: "Этап запуска: высокая энергия исполнения при низкой системности и интеграции."
    risks:
      - "Кассовые разрывы и ручное управление критичными процессами."
      - "Перегруз лидера и зависимость от одного центра решений."
      - "Срывы обязательств по срокам и качеству."
      - "Нестабильный клиентский опыт."
      - "Ошибки в фокусе продукта."
    normal_problems:
      - "Неустойчивый управленческий ритм."
      - "Размытые роли и ответственность."
    anomalous_problems:
      - "Политизация решений вместо фокуса на клиенте."
    next_actions_base:
      - "Ввести базовый контур контроля денег, обязательств и сроков."
      - "Определить владельцев ключевых потоков результата."
      - "Закрепить минимальные стандарты исполнения."
    actions_by_deficit:
      P:
        - "Усилить регулярный контроль выполнения клиентских обязательств."
      A:
        - "Внедрить план-факт и базовую дисциплину учета."
      E:
        - "Проводить короткие стратегические сессии по возможностям."
      I:
        - "Ввести единый формат управленческих встреч."
    dont:
      - "Не масштабировать расходы до стабилизации ядра."

  - id: "Давай-давай"
    order: 2
    next_stage: "Юность"
    admissibility:
      P: {min: 60}
      E: {min: 60}
      I: {max: 59}
    target: {P: 80, A: 40, E: 80, I: 40}
    description: "Быстрый рост за счет возможностей рынка, но интеграция и системность отстают."
    risks:
      - "Продажи опережают операционные возможности."
      - "Падение качества при росте объема."
      - "Снижение маржи из-за хаотичных решений."
      - "Конфликты на стыках функций."
      - "Перегруз управленческого центра."
    normal_problems:
      - "Операционный хаос на фоне роста."
      - "Недостаточная глубина бюджетирования."
    anomalous_problems:
      - "Системное игнорирование контроля и обратной связи."
    next_actions_base:
      - "Внедрить ритм информации, бюджетов и контроля."
      - "Ограничить непрофильные инициативы."
      - "Развести ответственность между функциями."
    actions_by_deficit:
      P:
        - "Закрепить SLA по срокам и качеству."
      A:
        - "Укрепить планирование ресурсов и мощностей."
      E:
        - "Отделить стратегические инициативы от реактивных задач."
      I:
        - "Синхронизировать функции через регулярные кросс-функциональные встречи."
    dont:
      - "Не брать все рыночные возможности без фильтра."

  - id: "Юность"
    order: 3
    next_stage: "Расцвет"
    admissibility:
      A: {min: 60}
      E: {min: 60}
      I: {max: 59}
      P: {min: 25}
    target: {P: 50, A: 75, E: 75, I: 40}
    description: "Перестройка управления: усиление A/E при еще недостаточной устойчивой интеграции I."
    risks:
      - "Конфликты полномочий и правил."
      - "Потеря темпа из-за перегиба в регламентах."
      - "Разрыв между стратегией и исполнением."
      - "Саботаж изменений."
      - "Откат в ручной режим в кризисах."
    normal_problems:
      - "Сопротивление части команды новой дисциплине."
      - "Неравномерное внедрение стандартов."
    anomalous_problems:
      - "Подмена результата процедурностью."
    next_actions_base:
      - "Закрепить полномочия и контур решений."
      - "Синхронизировать KPI, бюджеты и ответственность."
      - "Укрепить межфункциональную интеграцию."
    actions_by_deficit:
      P:
        - "Подтянуть дисциплину выполнения обязательств перед клиентом."
      A:
        - "Довести до нормы качество управленческого контура."
      E:
        - "Поддерживать темп стратегических решений."
      I:
        - "Развивать совместное принятие и исполнение решений."
    dont:
      - "Не вводить процедуры ради процедур."

  - id: "Расцвет"
    order: 4
    next_stage: "Стабильность"
    admissibility:
      I: {min: 60}
      E: {min: 60}
      P: {min: 50}
      A: {min: 50}
    target: {P: 70, A: 60, E: 75, I: 75}
    description: "Баланс роста и управляемости с опорой на долгосрочные E и I."
    risks:
      - "Самоуспокоенность и потеря рыночной чувствительности."
      - "Снижение предпринимательской энергии E."
      - "Смещение в избыточный контроль."
      - "Ослабление кросс-функциональной интеграции."
      - "Инерция, ведущая к старению."
    normal_problems:
      - "Постоянная калибровка баланса формы и функции."
      - "Конкуренция краткосрочной эффективности и долгосрочных инвестиций."
    anomalous_problems:
      - "Потеря E и уход в политику/форму."
    next_actions_base:
      - "Регулярно мониторить баланс P/A/E/I и корректировать его."
      - "Сохранять дисциплину исполнения без подавления инноваций."
      - "Инвестировать в долгосрочные возможности."
    actions_by_deficit:
      P:
        - "Повысить устойчивость выполнения клиентских обещаний."
      A:
        - "Обновить управленческий контур и контроль решений."
      E:
        - "Усилить стратегические инициативы и эксперименты."
      I:
        - "Укрепить доверие и совместное исполнение между функциями."
    dont:
      - "Не считать текущую модель управления финальной."

  - id: "Стабильность"
    order: 5
    next_stage: "Аристократизм"
    admissibility:
      P: {min: 60}
      A: {min: 60}
      I: {min: 60}
      E: {max: 59}
    target: {P: 75, A: 75, E: 45, I: 75}
    description: "Высокая управляемость при ослаблении предпринимательского компонента E."
    risks:
      - "Потеря темпа обновления и доли новых возможностей."
      - "Замедление реакции на рынок."
      - "Рост согласований и инерции."
      - "Снижение привлекательности для сильных лидеров."
      - "Сдвиг к формализму."
    normal_problems: []
    anomalous_problems:
      - "Проблемы старения трактуются как аномальные."
      - "Системное подавление E и инициатив."
    next_actions_base:
      - "Вернуть измеримые цели развития и обновления."
      - "Сократить цикл стратегических решений."
      - "Проверить, где контроль перестал служить результату."
    actions_by_deficit:
      P:
        - "Вернуть фокус на клиентскую ценность и скорость исполнения."
      A:
        - "Упростить процессы и убрать избыточный контроль."
      E:
        - "Увеличить инвестиции в инициативы будущего."
      I:
        - "Пересобрать взаимодействие функций вокруг общей цели."
    dont:
      - "Не превращать отчетность в самоцель."

  - id: "Аристократизм"
    order: 6
    next_stage: "Ранний бюрократизм"
    admissibility:
      A: {min: 60}
      I: {min: 60}
      E: {max: 59}
      P: {min: 25, max: 59}
    target: {P: 55, A: 80, E: 35, I: 75}
    description: "Форма доминирует над функцией, усиливается внутренняя политика."
    risks:
      - "Падение клиентской ценности при внешнем порядке."
      - "Рост согласований без эффекта."
      - "Снижение скорости решений."
      - "Уход практичных лидеров."
      - "Переход к бюрократизации."
    normal_problems: []
    anomalous_problems:
      - "Проблемы старения трактуются как аномальные."
      - "Доминирование политики над результатом."
    next_actions_base:
      - "Вернуть приоритет клиентскому результату и скорости."
      - "Сократить уровни согласования."
      - "Назначить владельцев сквозных результатов."
    actions_by_deficit:
      P:
        - "Жестко контролировать выполнение обязательств перед клиентом."
      A:
        - "Оставить только процессы, влияющие на результат."
      E:
        - "Запустить пакет инициатив обновления."
      I:
        - "Снизить политизацию через единые правила работы."
    dont:
      - "Не маскировать слабый результат красивой формой."

  - id: "Ранний бюрократизм"
    order: 7
    next_stage: "Бюрократия"
    admissibility:
      P: {max: 49}
      E: {max: 49}
    target: {P: 35, A: 75, E: 30, I: 45}
    description: "Система работает на себя, решения и координация замедлены."
    risks:
      - "Системные задержки решений."
      - "Потеря клиентов на стыках функций."
      - "Рост фиксированных издержек."
      - "Эскалация внутренних конфликтов."
      - "Риск перехода в полную бюрократию."
    normal_problems: []
    anomalous_problems:
      - "Проблемы старения трактуются как аномальные."
      - "Политизация вместо устранения причин."
    next_actions_base:
      - "Пересобрать критические клиентские потоки."
      - "Вернуть персональную ответственность за результат."
      - "Ввести жесткие сроки принятия решений."
    actions_by_deficit:
      P:
        - "Восстановить базовую операционную результативность."
      A:
        - "Радикально упростить регламентный контур."
      E:
        - "Провести антикризисную стратегическую ревизию."
      I:
        - "Перезапустить межфункциональную интеграцию."
    dont:
      - "Не лечить кризис новыми комитетами."

  - id: "Бюрократия"
    order: 8
    next_stage: null
    admissibility:
      P: {max: 39}
      E: {max: 39}
    target: {P: 20, A: 70, E: 20, I: 25}
    description: "Система доминирует над рынком, внутренние изменения крайне затруднены."
    risks:
      - "Потеря рыночной релевантности."
      - "Нарастание убытков."
      - "Неспособность к внутренним изменениям."
      - "Репутационные потери."
      - "Риск реструктуризации или остановки."
    normal_problems: []
    anomalous_problems:
      - "Проблемы старения трактуются как аномальные."
      - "Полный разрыв между формой и ценностью для клиента."
    next_actions_base:
      - "Сфокусировать ресурсы на жизнеспособном ядре."
      - "Радикально упростить структуру."
      - "Привлечь внешнюю антикризисную экспертизу."
    actions_by_deficit:
      P:
        - "Восстановить минимум операционной результативности."
      A:
        - "Полностью пересмотреть регламентную систему."
      E:
        - "Определить новую модель жизнеспособности на 12-18 месяцев."
      I:
        - "Собрать антикризисную команду с единым центром ответственности."
    dont:
      - "Не пытаться сохранить весь текущий контур любой ценой."
