report:
  section_order:
    - stage_header
    - profile
    - indices
    - description
    - risks
    - normal_problems
    - anomalous_problems
    - actions
    - dont
  risk_count: 5
  problems_count: 5
  actions_max: 5
  dont_max: 5
  fallback_deficit_threshold: 60

deficit_priorities:
  A:
    - "Усилить A: ввести стабильный управленческий ритм, фиксацию решений и ресурсное планирование."
  E:
    - "Вернуть E: запустить контур экспериментов и регулярный стратегический обзор."
  I:
    - "Усилить I: убрать силосы через кросс-функциональные механизмы и общие цели."

fallback:
  general_do:
    - "Сфокусироваться на одном приоритетном узком месте и закрыть его в ближайшем цикле."
    - "Перепроверить управленческие правила: кто принимает решения, в какие сроки и по каким критериям."
  general_dont:
    - "Не пытаться одновременно чинить все функции без приоритезации."
    - "Не подменять устранение причин косметическими инициативами."

deficit_library:
  P:
    normal_problems:
      - "Нестабильность результата для клиента при росте нагрузки."
    abnormal_problems:
      - "Системные срывы обязательств и каскадные операционные сбои."
    do:
      - "Укрепить P: зафиксировать стандарт качества и сроков, настроить контроль исполнения."
    dont:
      - "Не наращивать продажи, если базовое исполнение не стабилизировано."
  A:
    normal_problems:
      - "Решения принимаются, но не закрепляются в устойчивых правилах."
    abnormal_problems:
      - "Повторяющиеся управленческие сбои из-за отсутствия процесса и дисциплины."
    do:
      - "Усилить A: ввести ритм управления, фиксацию решений и план-факт контроль."
    dont:
      - "Не оставлять ответственность размытой между ролями и функциями."
  E:
    normal_problems:
      - "Инициативы по развитию появляются нерегулярно и зависят от отдельных людей."
    abnormal_problems:
      - "Потеря способности видеть и использовать новые рыночные возможности."
    do:
      - "Вернуть E: запустить регулярные эксперименты и стратегический обзор возможностей."
    dont:
      - "Не обнулять предпринимательский контур ради краткосрочного спокойствия."
  I:
    normal_problems:
      - "Кросс-функциональная координация держится на личных договоренностях."
    abnormal_problems:
      - "Конфликты между функциями блокируют исполнение ключевых решений."
    do:
      - "Усилить I: настроить сквозные механизмы интеграции и общие цели между функциями."
    dont:
      - "Не допускать силосной логики и локальной оптимизации в ущерб общему результату."

stages:
  "Младенчество":
    description_base: "Компания держится на энергии выполнения, но системность и интеграция еще слабы."
    risks:
      - "Кассовые разрывы и ручной режим управления."
      - "Срыв клиентских обязательств при росте нагрузки."
      - "Перегруз ключевых лидеров."
      - "Ошибки приоритетов из-за отсутствия фокуса."
      - "Нестабильное качество сервиса."
    normal_problems:
      - "Нехватка управленческой инфраструктуры."
      - "Размытые роли на старте."
      - "Нерегулярный управленческий ритм."
    abnormal_problems:
      - "Политизация решений вместо клиентского фокуса."
      - "Отсутствие обучения на ошибках."
    do:
      - "Ввести базовый контроль денег, сроков и обязательств."
      - "Назначить владельцев ключевых процессов."
      - "Закрепить минимальные стандарты результата."
    dont:
      - "Не масштабировать расходы до стабилизации ядра."
      - "Не строить модель на героизме отдельных людей."

  "Давай-давай":
    description_base: "Растут продажи и скорость, но интеграция и контроль отстают."
    risks:
      - "Продажи обгоняют операционные возможности."
      - "Просадка качества при росте объема."
      - "Падение маржи из-за хаотичных решений."
      - "Конфликты между функциями."
      - "Перегруз центра принятия решений."
    normal_problems:
      - "Хаос на стыке функций."
      - "Слабое бюджетирование на фоне роста."
      - "Постоянные перегрузки команды."
    abnormal_problems:
      - "Игнорирование ограничений мощности."
      - "Системные срывы обязательств."
    do:
      - "Отстроить контур план-факт и ресурсного планирования."
      - "Ограничить непрофильные инициативы."
      - "Укрепить контроль качества поставки ценности."
    dont:
      - "Не брать все возможности без фильтра."
      - "Не закрывать хаос только наймом."

  "Юность":
    description_base: "Компания строит управленческую систему и балансирует рост с формализацией."
    risks:
      - "Конфликты полномочий и ролей."
      - "Перегиб в процедурах и потеря темпа."
      - "Разрыв между стратегией и исполнением."
      - "Саботаж изменений на среднем уровне."
      - "Откат в ручное управление."
    normal_problems:
      - "Сопротивление новой дисциплине."
      - "Неравномерное внедрение стандартов."
      - "Пересборка управленческой структуры."
    abnormal_problems:
      - "Процедуры ради процедур."
      - "Потеря предпринимательской инициативы."
    do:
      - "Закрепить полномочия и зоны ответственности."
      - "Синхронизировать KPI и бюджеты между функциями."
      - "Укрепить кросс-функциональную интеграцию."
    dont:
      - "Не множить комитеты без влияния на результат."
      - "Не держать параллельные центры власти."

  "Ранний Расцвет":
    description_base: "Сильные P/A/E уже сформированы, I еще не достигла зрелого уровня Расцвета."
    risks:
      - "Недостаточная глубина интеграции между функциями."
      - "Смещение в локальную оптимизацию вместо общего результата."
      - "Риск замедления перехода к зрелому Расцвету."
      - "Неравномерная управленческая дисциплина по подразделениям."
      - "Рост нагрузки на ключевые связующие роли."
    normal_problems:
      - "Донастройка механизмов интеграции."
      - "Баланс краткосрочных и долгосрочных целей."
      - "Уточнение контуров ответственности."
    abnormal_problems:
      - "Политизация взаимодействия между функциями."
      - "Срыв интеграционных инициатив."
    do:
      - "Ускорить формирование устойчивых интеграционных механизмов."
      - "Закрепить сквозные метрики между функциями."
      - "Развивать руководителей второго контура."
    dont:
      - "Не считать достигнутый баланс финальным."
      - "Не подменять интеграцию формальными согласованиями."

  "Расцвет":
    description_base: "Баланс управляемости и развития: организация одновременно эффективна и адаптивна."
    risks:
      - "Самоуспокоенность и потеря чувствительности к рынку."
      - "Снижение предпринимательской энергии."
      - "Рост управленческой инерции."
      - "Ослабление межфункционального доверия."
      - "Смещение в чрезмерный контроль."
    normal_problems:
      - "Конфликт краткосрочности и долгосрочности."
      - "Необходимость постоянной калибровки E и A."
      - "Сложность удержания баланса при росте."
    abnormal_problems:
      - "Системное падение E."
      - "Уход в бюрократию при сохранении внешнего роста."
    do:
      - "Поддерживать баланс P/A/E/I на уровне всей компании."
      - "Регулярно обновлять стратегический контур."
      - "Сохранять скорость экспериментов без потери контроля."
    dont:
      - "Не экономить на развитии людей и продукта."
      - "Не усиливать A до блокировки E."

  "Стабильность":
    description_base: "Высокая управляемость сохранена, но предпринимательский импульс ослабевает."
    risks:
      - "Потеря темпа обновления."
      - "Смещение в удержание вместо развития."
      - "Замедление реакции на рынок."
      - "Рост внутренних согласований."
      - "Постепенная бюрократизация."
    normal_problems:
      - "Сложность поддерживать драйв изменений."
      - "Осторожность в выборе новых инициатив."
      - "Увеличение цикла принятия решений."
    abnormal_problems:
      - "Системное подавление E."
      - "Замыкание управления на форму вместо результата."
    do:
      - "Вернуть цели роста и обновления в управленческий цикл."
      - "Сократить цикл стратегических решений."
      - "Поддержать инициативы с долгосрочной ценностью."
    dont:
      - "Не превращать отчетность в самоцель."
      - "Не блокировать инициативы из страха ошибок."

  "Аристократизм":
    description_base: "Форма начинает доминировать над функцией, усиливается внутренняя политика."
    risks:
      - "Падение клиентской ценности при внешнем порядке."
      - "Рост согласований без эффекта."
      - "Снижение скорости решений."
      - "Уход практичных лидеров."
      - "Углубление бюрократических практик."
    normal_problems:
      - "Сложность поддерживать предпринимательскую энергию."
      - "Избыточная церемониальность решений."
      - "Снижение толерантности к риску."
    abnormal_problems:
      - "Доминирование политики над результатом."
      - "Игнорирование сигналов клиента."
    do:
      - "Вернуть приоритет клиентскому результату и скорости."
      - "Сократить уровни согласования."
      - "Перезапустить контур ответственности за сквозной результат."
    dont:
      - "Не маскировать слабый результат презентациями."
      - "Не усиливать штабные функции без бизнес-эффекта."

  "Ранний бюрократизм":
    description_base: "Система работает на себя, ценность для клиента падает, растёт управленческий паралич."
    risks:
      - "Системные задержки решений."
      - "Потеря клиентов на стыках функций."
      - "Рост постоянных издержек."
      - "Эскалация внутренних конфликтов."
      - "Скатывание в бюрократию."
    normal_problems:
      - "Жёсткая формализация взаимодействий."
      - "Перегруженные согласовательные контуры."
      - "Сложность координации между функциями."
    abnormal_problems:
      - "Политизация вместо решения причин."
      - "Разрыв между целями и исполнением."
    do:
      - "Пересобрать критические клиентские потоки."
      - "Вернуть персональную ответственность за результат."
      - "Упростить регламентный контур до минимума."
    dont:
      - "Не лечить кризис созданием новых комитетов."
      - "Не путать формальную дисциплину с эффективностью."

  "Бюрократия":
    description_base: "Крайняя стадия: A доминирует, а P/E/I почти утрачены, организация теряет жизнеспособность."
    risks:
      - "Потеря рыночной релевантности."
      - "Нарастание убытков."
      - "Неспособность к внутренним изменениям."
      - "Репутационные потери."
      - "Риск распада бизнес-модели."
    normal_problems:
      - "Формальная управляемость без результата."
      - "Сверхдлинные циклы решений."
      - "Провалы межфункциональной координации."
    abnormal_problems:
      - "Системный отказ от развития."
      - "Разрыв между управлением и клиентской ценностью."
    do:
      - "Сфокусироваться на жизнеспособном ядре бизнеса."
      - "Провести радикальное упрощение структуры."
      - "Запустить антикризисный сценарий с внешней экспертизой."
    dont:
      - "Не удерживать весь текущий контур любой ценой."
      - "Не откладывать непопулярные, но необходимые решения."
