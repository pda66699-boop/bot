questions:
  - id: P1
    dim: P
    text: "Насколько стабильно вы выполняете обещания клиентам (срок/качество/объём) без «пожаров»?"
    options:
      A: "Почти всегда: отклонения редки и быстро устраняются системно."
      B: "В целом выполняем, но периодически «дожимаем» вручную."
      C: "Срывы/переделки случаются регулярно, многое держится на героизме."
      D: "Нестабильно: сроки/качество часто плавают, клиент это чувствует."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [growth, quality]}

  - id: P2
    dim: P
    text: "Когда продажи/объём растут, что происходит с качеством выполнения и удовлетворённостью клиентов?"
    options:
      A: "Рост не ломает качество: ограничения мощности видны и управляются заранее."
      B: "Иногда качество проседает, но быстро выравниваем и закрепляем улучшения."
      C: "Часто продаём больше, чем можем качественно выполнить."
      D: "Качество вторично: главное — объём/скорость, последствия разгребаем потом."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [gogo, overload]}

  - id: P3
    dim: P
    text: "Насколько повторные покупки/продления подтверждают, что вы удовлетворяете потребность клиента?"
    options:
      A: "Повторные покупки/продления — норма, удержание стабильно подтверждает ценность."
      B: "Повторные покупки есть, но заметно зависят от людей/периодов."
      C: "Повторные покупки нерегулярны: каждый раз как «продаём заново»."
      D: "Повторных покупок почти нет (или держатся на скидках/разовых усилиях)."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [market_fit]}

  - id: P4
    dim: P
    text: "Насколько устойчив денежный поток от основной деятельности (без «качелей» и кассовых разрывов)?"
    options:
      A: "Устойчив: поступления предсказуемы, кассовые провалы редки."
      B: "Скорее устойчив, но есть заметная сезонность/проектные провалы."
      C: "Нестабилен: «то густо, то пусто», часто живём от поступления к поступлению."
      D: "Регулярные кассовые разрывы/непредвиденные провалы, выживание на первом месте."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [cash]}

  - id: P5
    dim: P
    text: "Что чаще воспринимается как «главный критерий успеха» внутри компании?"
    options:
      A: "Соблюдение процедур/регламентов и правильность оформления важнее результата."
      B: "Процедуры и результат важны, но часто выигрывает форма и «как сделано»."
      C: "Баланс: и процедура, и результат значимы; результат часто важнее формальностей."
      D: "В первую очередь оценивают по результату и ценности для клиента."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: true, stage_signals: [aging, form_over_function]}

  - id: P6
    dim: P
    text: "О чём чаще всего спорит топ-команда?"
    options:
      A: "Про статус, влияние, «кто главнее», внутренние границы и правила игры."
      B: "Про согласования/регламенты/«кто должен», часто без привязки к рынку."
      C: "И про рынок/клиента, и про внутренние правила — примерно поровну."
      D: "Про клиента, продукт, рынок и результаты (выручка/прибыль/качество)."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: true, stage_signals: [politics, aging]}

  - id: A1
    dim: A
    text: "Насколько выстроены бухгалтерский/управленческий учёт и регулярный контроль денег (прибыль, издержки, дебиторка)?"
    options:
      A: "Системно и регулярно: цифры доступны вовремя и реально управляют решениями."
      B: "В целом есть, но отдельные зоны ещё нестабильны/запаздывают."
      C: "Эпизодически: цифры неполные/поздние, решения часто принимаются вслепую."
      D: "Системного контроля почти нет: реагируем постфактум."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [control, gogo]}

  - id: A2
    dim: A
    text: "Насколько решения превращаются в устойчивые правила/стандарты и реально соблюдаются?"
    options:
      A: "Быстро оформляем и соблюдаем: договорённости закрепляются и работают."
      B: "Часть закрепляется, часть остаётся на уровне устных договорённостей."
      C: "Правила есть, но их часто нарушают (особенно ключевые люди)."
      D: "Правил/стандартов почти нет: каждый раз решаем заново."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [system, adolescence]}

  - id: A3
    dim: A
    text: "Есть ли регулярный управленческий ритм (план-факт, бюджеты, разбор отклонений, корректировки)?"
    options:
      A: "Да: регулярный цикл и дисциплина исполнения, отклонения разруливаются по правилам."
      B: "Частично: цикл есть, но дисциплина и качество разбора нестабильны."
      C: "Нерегулярно: план-факт бывает, но редко приводит к корректирующим действиям."
      D: "Почти нет: управление реактивное, «разгребаем» по мере поступления проблем."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [control, adolescence]}

  - id: A4
    dim: A
    text: "Как компания планирует ресурсы (люди/мощность/деньги) перед ростом продаж или запуском инициатив?"
    options:
      A: "Планируем ресурсно: считаем мощность/деньги, ограничиваем обещания и выбираем приоритеты."
      B: "Планируем частично: ключевые риски видим, но просчёты случаются."
      C: "Чаще «догоняем» ресурсами уже после продаж, перегружаем команду."
      D: "Ресурс почти не считают: «берём всё», а потом тушим последствия."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [gogo, overload]}

  - id: A5
    dim: A
    text: "Насколько роли/зоны ответственности формализованы и понятны (кто за что отвечает и чем измеряется)?"
    options:
      A: "Чётко: ответственность закреплена, пересечений минимум, измерения понятны."
      B: "В целом понятно, но есть «серые зоны» и пересечения."
      C: "Размыто: многое решается «по звонку», ответственность плавает."
      D: "Почти не определено: люди делают всё подряд, границы ролей отсутствуют."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [roles, infancy]}

  - id: A6
    dim: A
    text: "Как обычно проходят изменения в процессах/правилах?"
    options:
      A: "Через понятный порядок: пилот -> фиксация стандарта -> обучение -> контроль соблюдения."
      B: "Есть порядок, но часто сокращаем шаги из-за срочности."
      C: "Меняем ситуативно, стандарты не успевают закрепляться."
      D: "Хаотично: каждый меняет «как удобно», единых правил нет."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [system]}

  - id: E1
    dim: E
    text: "Насколько регулярно руководство обсуждает будущее (возможности/угрозы/куда идём) и принимает решения на этой основе?"
    options:
      A: "Постоянно: стратегический контур живой, решения регулярно корректируются под внешнюю среду."
      B: "Регулярно, но иногда «смывает» операционкой на недели/месяцы."
      C: "Редко: обсуждаем эпизодически, в основном живём текущим."
      D: "Почти никогда: изменения воспринимаются как риск/помеха."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [strategy, prime]}

  - id: E2
    dim: E
    text: "Как компания относится к возможностям рынка: умеет ли отказываться от «соблазнов», не подходящих стратегии/марже?"
    options:
      A: "Умеем говорить «нет»: есть критерии, когда/почему отказаться от возможности."
      B: "Частично: критерии есть, но иногда всё равно «впрыгиваем»."
      C: "Часто хватаемся за многое, фокус расплывается."
      D: "Берём почти всё, что можно продать — без фильтра."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [gogo, prime]}

  - id: E3
    dim: E
    text: "Насколько компания создаёт возможности сама (новые продукты/каналы/технологии), а не только реагирует на внешние?"
    options:
      A: "Проактивно создаём: есть поток экспериментов и выводов, не завязанный на одного человека."
      B: "Создаём периодически, но инициативы часто завязаны на отдельных лидеров."
      C: "Редко создаём: в основном реагируем, часто с опозданием."
      D: "Почти не создаём: важнее сохранить статус-кво."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [prime, aging]}

  - id: E4
    dim: E
    text: "Как в компании устроены инновации и эксперименты?"
    options:
      A: "Есть «машинка экспериментов»: гипотезы, быстрые проверки, решения о масштабировании/закрытии."
      B: "Эксперименты бывают, но без устойчивого процесса и метрик."
      C: "Эксперименты редки и случайны, инициативы быстро затухают."
      D: "Эксперименты не приветствуются: «у нас так не принято»."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [prime, aging]}

  - id: E5
    dim: E
    text: "Как организация относится к риску (новые решения, изменения, инвестиции в будущее)?"
    options:
      A: "Готовы брать управляемый риск ради будущего и понимаем, что иначе начнём стареть."
      B: "Риск берём дозированно, стараемся держать баланс."
      C: "Скорее избегаем риска: важнее не ошибиться и сохранить стабильность."
      D: "Избегаем риска любой ценой, инициативы гаснут на согласованиях."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [stability, aging]}

  - id: E6
    dim: E
    text: "Насколько быстро организация принимает решения об изменениях (от идеи до решения) без потери качества?"
    options:
      A: "Достаточно быстро: быстро уточняем и принимаем решение, сохраняя качество анализа."
      B: "Скорость средняя: решения иногда затягиваются из-за согласований."
      C: "Медленно: идеи тонут в страхе ошибиться/внутренних барьерах."
      D: "Практически невозможно: система сопротивляется любым изменениям."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [bureaucracy, aging]}

  - id: I1
    dim: I
    text: "Как в компании решаются конфликты между функциями (продажи/производство/финансы и т.д.)?"
    options:
      A: "Конструктивно: есть доверие и уважение, спор ведёт к лучшему решению."
      B: "Иногда конструктивно, но бывает уход в эмоции/личное."
      C: "Часто деструктивно: каждый защищает своё, растёт внутренняя борьба."
      D: "Преобладает поиск виновных/козлов отпущения, атмосфера подозрительности."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [integration, adolescence]}

  - id: I2
    dim: I
    text: "Насколько управление и взаимодействие завязаны на «склеивающего человека» (основатель/ключевой лидер)?"
    options:
      A: "Сильно: без него решения/взаимодействия стопорятся или разваливаются."
      B: "Заметно, но часть взаимодействий уже держится на ролях/процессах."
      C: "Небольшая зависимость: система работает через роли и правила."
      D: "Почти нет: организация интегрирована, решения устойчивы без конкретной личности."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [founder_trap, adolescence]}

  - id: I3
    dim: I
    text: "Насколько решения принимаются совместно и затем исполняются без саботажа и «разборок»?"
    options:
      A: "Есть совместная выработка решения и дисциплина исполнения (решили — делаем)."
      B: "Вовлечённость частичная, исполнение иногда буксует."
      C: "Либо обсуждаем бесконечно без решения, либо внедряем силой без принятия."
      D: "Каждый тянет в свою сторону, решения не склеивают организацию."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [integration, prime]}

  - id: I4
    dim: I
    text: "Как устроен обмен информацией между подразделениями (сквозные процессы, клиентский путь)?"
    options:
      A: "Информация течёт свободно, клиент не «собирает пазл» сам."
      B: "В целом нормально, но есть узкие места и зависимость от отдельных людей."
      C: "Сильные барьеры/силосы: информацию приходится «доставать»."
      D: "Дезинтеграция: каждый знает кусочек, общая картина отсутствует."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [integration, bureaucracy]}

  - id: I5
    dim: I
    text: "Как работают регулярные управленческие встречи как механизм интеграции (договорились -> сделали)?"
    options:
      A: "Регулярно, по правилам, с фиксацией решений и контролем выполнения."
      B: "Регулярно, но качество доведения решений нестабильно."
      C: "Нерегулярно или превращается в «поговорили и разошлись»."
      D: "Встречи — поле политики/борьбы, решений и выполнения мало."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: false, stage_signals: [integration, politics]}

  - id: I6
    dim: I
    text: "Когда возникает проблема, какая реакция становится нормой?"
    options:
      A: "Подковёрная борьба/политика: проблема превращается в «кто виноват и чей это человек»."
      B: "Чаще поиск виновных, чем устранение причины."
      C: "Смешанный подход: ищем и виновных, и решение причины."
      D: "Фокус на исправлении системы и причины: «что меняем, чтобы не повторялось»."
    score: {A: 3, B: 2, C: 1, D: 0}
    flags: {inversion: true, stage_signals: [politics, bureaucracy, aging]}
