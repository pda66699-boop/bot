config:
  transition_delta: 8
  hybrid_delta: 6
  regress_delta: 5
  vector_targets:
    upper: 75
    lower: 45
    zero: 10

stages:
  - name: "Младенчество"
    order: 1
    anchor_codes: ["Paei"]
    next_stage: "Давай-давай"
    description: "Организация выживает за счет энергии и короткого горизонта; формальных систем мало."
    risks:
      - "Кассовые разрывы из-за слабого операционного контроля."
      - "Зависимость от одного лидера и перегруз руководства."
      - "Срывы обязательств из-за хаотичного роста."
      - "Нестабильное качество и потеря первых клиентов."
      - "Ошибки в приоритетах и фокусе продукта."
    normal_problems:
      - "Нехватка управленческой инфраструктуры."
      - "Ручной режим принятия решений."
      - "Роли сотрудников пересекаются."
    anomalous_problems:
      - "Хроническая политизация решений."
      - "Остановка обучения на ошибках."
    next_actions_base:
      - "Собрать минимальный управленческий контур: деньги, обязательства, сроки."
      - "Выделить владельцев ключевых потоков ценности."
      - "Зафиксировать базовые правила исполнения и обратной связи."
    actions_by_deficit:
      P:
        - "Усилить дисциплину исполнения клиентских обязательств."
        - "Ввести еженедельный контроль качества и повторных покупок."
      A:
        - "Внедрить простой план-факт и контроль кассового разрыва."
        - "Закрепить роли и ответственность на уровне команды."
      E:
        - "Проводить регулярные сессии по будущим рискам и возможностям."
        - "Определить критерии выбора инициатив, чтобы не распыляться."
      I:
        - "Ввести единый формат управленческих встреч и фиксацию решений."
        - "Убрать персональные конфликты через прозрачные правила эскалации."
    dont:
      - "Не масштабировать расходы до стабилизации ядра."
      - "Не строить управление вокруг героизма."

  - name: "Давай-давай"
    order: 2
    anchor_codes: ["PaEi"]
    next_stage: "Юность"
    description: "Компания растет за счет рыночных возможностей, но управленческие системы отстают."
    risks:
      - "Рост продаж без ресурсного обеспечения."
      - "Просадка качества при перегрузке команды."
      - "Снижение маржи из-за ситуативных решений."
      - "Конфликты между функциями и узкие места."
      - "Зависимость от основателя в ежедневных решениях."
    normal_problems:
      - "Перегрузка и операционный хаос при ускорении роста."
      - "Недостаточная глубина бюджетирования."
      - "Ручная координация между функциями."
    anomalous_problems:
      - "Системное игнорирование финансового контроля."
      - "Политизация вместо клиентского фокуса."
    next_actions_base:
      - "Внедрить регулярный цикл информации, бюджетов и контроля."
      - "Сузить фокус инициатив и убрать непрофильные проекты."
      - "Разделить ответственность между продажами, операциями и финансами."
    actions_by_deficit:
      P:
        - "Ввести SLA по срокам/качеству и контроль исполнения."
      A:
        - "Укрепить учет, план-факт и правила приоритизации мощностей."
      E:
        - "Отделить стратегические инициативы от реактивных задач."
      I:
        - "Регулярно синхронизировать функции на уровне руководителей."
    dont:
      - "Не брать все возможности без фильтра по стратегии и марже."
      - "Не закрывать системные проблемы наймом «поверх хаоса»."

  - name: "Юность"
    order: 3
    anchor_codes: ["PAei", "pAEi"]
    next_stage: "Расцвет"
    description: "Переход от предпринимательского импульса к управляемой системе с борьбой за новые правила игры."
    risks:
      - "Потеря темпа из-за перегиба в регламентах."
      - "Внутренние конфликты полномочий."
      - "Разрыв между стратегией и исполнением."
      - "Саботаж изменений на среднем уровне."
      - "Откат к ручному управлению в кризисных точках."
    normal_problems:
      - "Конфликты роли/власть при перестройке."
      - "Неравномерное качество внедрения новых правил."
      - "Сопротивление части команды стандартизации."
    anomalous_problems:
      - "Подмена результативности процедурностью."
      - "Отсутствие интеграции между функциями после формализации."
    next_actions_base:
      - "Закрепить полномочия и границы решений по уровням."
      - "Синхронизировать контуры целей, бюджетов и KPI."
      - "Укрепить интеграцию через регулярные кросс-функциональные ритмы."
    actions_by_deficit:
      P:
        - "Уточнить стандарты результата для ключевых клиентских потоков."
      A:
        - "Довести до дисциплины исполнение план-факта и разбор отклонений."
      E:
        - "Поддерживать предпринимательский контур, чтобы не потерять рост."
      I:
        - "Встроить практики совместного принятия решений без саботажа."
    dont:
      - "Не вводить процедуры ради процедур."
      - "Не сохранять параллельные центры власти."

  - name: "Расцвет"
    order: 4
    anchor_codes: ["PAEi", "paEI"]
    next_stage: "Стабильность"
    description: "Баланс роста и управляемости; акцент на долгосрочный EI при сохранении работоспособного pa."
    risks:
      - "Самоуспокоенность и потеря чувствительности к рынку."
      - "Снижение предпринимательской энергии E."
      - "Смещение в избыточный контроль и замедление решений."
      - "Ослабление интеграции между функциями."
      - "Нарастание инерции, ведущей к старению."
    normal_problems:
      - "Необходимость постоянной калибровки баланса формы и функции."
      - "Конкуренция между краткосрочной эффективностью и долгосрочными инвестициями."
      - "Перегруз портфеля инициатив при хорошем рынке."
    anomalous_problems:
      - "Потеря E и отказ от обновления стратегии."
      - "Политика и форма важнее клиента/результата."
    next_actions_base:
      - "Регулярно мониторить баланс P/A/E/I и корректировать его."
      - "Сохранять дисциплину исполнения без подавления инноваций."
      - "Инвестировать в долгосрочные возможности и интеграцию команды."
    actions_by_deficit:
      P:
        - "Усилить контроль клиентской ценности и ритм исполнения обещаний."
      A:
        - "Обновить управленческий контур: метрики, бюджеты, контроль решений."
      E:
        - "Пересобрать стратегический контур и портфель экспериментов."
      I:
        - "Укрепить доверие между функциями и совместное исполнение решений."
    dont:
      - "Не считать текущую модель управления финальной."
      - "Не экономить на обновлении продукта и людей."

  - name: "Стабильность"
    order: 5
    anchor_codes: ["PAeI"]
    next_stage: "Аристократизм"
    description: "Эффективность сохраняется, но снижается готовность к риску и обновлению."
    risks:
      - "Сокращение доли новых возможностей в портфеле."
      - "Замедление реакции на рыночные сигналы."
      - "Фокус на удержании, а не на развитии."
      - "Рост бюрократической нагрузки."
      - "Потеря сильных предпринимательских лидеров."
    normal_problems:
      - "Осторожность в инвестициях и инициативах."
      - "Растущий приоритет внутренних согласований."
    anomalous_problems:
      - "Системное подавление E и инноваций."
      - "Закрытость к внешним изменениям."
    next_actions_base:
      - "Вернуть измеримые цели роста и обновления."
      - "Сократить цикл стратегических решений."
      - "Проверить, где контроль перестал служить результату."
    actions_by_deficit:
      P:
        - "Поддержать клиентский фокус и скорость исполнения."
      A:
        - "Упростить перегруженные процессы и убрать дубли контроля."
      E:
        - "Увеличить инвестиции в инициативы будущего."
      I:
        - "Пересобрать взаимодействие функций вокруг общей цели."
    dont:
      - "Не превращать отчетность в самоцель."
      - "Не блокировать инициативы из-за страха ошибок."

  - name: "Аристократизм"
    order: 6
    anchor_codes: ["pAeI"]
    next_stage: "Ранний бюрократизм"
    description: "Форма начинает доминировать над функцией, усиливается внутренняя политика."
    risks:
      - "Падение клиентской ценности при внешнем порядке."
      - "Рост внутренних согласований без эффекта."
      - "Снижение скорости операционных решений."
      - "Выдавливание практичных лидеров."
      - "Переход к параличу межфункционального взаимодействия."
    normal_problems:
      - "Избыточная церемониальность управления."
      - "Снижение инициативности из-за страха ошибки."
    anomalous_problems:
      - "Доминирование политики над результатом."
      - "Потеря обратной связи от клиента."
    next_actions_base:
      - "Вернуть приоритет клиентскому результату и скорости."
      - "Сократить уровни согласования и убрать ритуалы без ценности."
      - "Назначить владельцев сквозных результатов."
    actions_by_deficit:
      P:
        - "Жестко измерять выполнение обязательств перед клиентом."
      A:
        - "Оставить только процессы, напрямую влияющие на результат."
      E:
        - "Запустить ограниченный пакет инициатив обновления."
      I:
        - "Снизить политизацию через прозрачные правила совместной работы."
    dont:
      - "Не маскировать слабый результат красивой формой."
      - "Не расширять штабные функции без влияния на ценность."

  - name: "Ранний бюрократизм"
    order: 7
    anchor_codes: ["0A0i"]
    next_stage: "Бюрократия"
    description: "Внутренняя система работает на себя, координация дорожает, клиентская ценность падает."
    risks:
      - "Системные задержки решений и поставки ценности."
      - "Потеря клиентов на стыках функций."
      - "Рост фиксированных издержек."
      - "Эскалация внутренних конфликтов."
      - "Скатывание в полную бюрократию."
    normal_problems:
      - "В книге проблемы старения считаются аномальными."
    anomalous_problems:
      - "Функциональная дезинтеграция и паралич ответственности."
      - "Политизация вместо устранения причин."
      - "Системное игнорирование сигнала рынка."
    next_actions_base:
      - "Пересобрать критические потоки ценности под клиента."
      - "Вернуть персональную ответственность за результат."
      - "Ввести жесткие сроки принятия решений и эскалации."
    actions_by_deficit:
      P:
        - "Восстановить базовую результативность ключевых операций."
      A:
        - "Радикально упростить контур правил и контрольных точек."
      E:
        - "Провести антикризисную стратегическую ревизию."
      I:
        - "Перезапустить взаимодействие функций через единые цели."
    dont:
      - "Не лечить кризис созданием новых комитетов."
      - "Не путать соблюдение формы с прогрессом."

  - name: "Бюрократия"
    order: 8
    anchor_codes: ["0A00"]
    next_stage: null
    description: "Система доминирует над рынком; без радикальной трансформации восстановление маловероятно."
    risks:
      - "Потеря рыночной релевантности."
      - "Нарастание убытков и долговой нагрузки."
      - "Неспособность к внутренним изменениям."
      - "Репутационные потери для клиентов и команды."
      - "Риск реструктуризации или остановки деятельности."
    normal_problems:
      - "В книге проблемы старения считаются аномальными."
    anomalous_problems:
      - "Полный разрыв между формой управления и ценностью для клиента."
      - "Невозможность быстро реализовать даже согласованные решения."
    next_actions_base:
      - "Сфокусировать ресурсы на жизнеспособном ядре."
      - "Упростить структуру и сократить уровни управления."
      - "Привлечь внешнюю антикризисную экспертизу с мандатом на изменения."
    actions_by_deficit:
      P:
        - "Восстановить минимум операционной результативности."
      A:
        - "Полностью пересмотреть регламентный контур."
      E:
        - "Определить новую модель жизнеспособности на 12-18 месяцев."
      I:
        - "Собрать антикризисную команду с единым центром ответственности."
    dont:
      - "Не пытаться сохранить весь контур любой ценой."
      - "Не откладывать непопулярные решения."
