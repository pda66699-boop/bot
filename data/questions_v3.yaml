    dimension: I
    weight: 1.4
    required: true
    options:
      A:
        text: "Подковёрная борьба/политика: проблема превращается в «кто виноват и чей это человек»."
        paei: {I: 0.0}
        traits: {political_behavior: 1.8, blame_culture: 1.2, root_cause_orientation: 0.0}
        stage_signals: {aristocracy_signal: 0.9, early_bureaucracy_signal: 0.9, bureaucracy_signal: 0.5}
      B:
        text: "Чаще поиск виновных, чем устранение причины."
