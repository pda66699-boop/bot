        traits: {blame_culture: 1.5, root_cause_orientation: 0.2}
        stage_signals: {early_bureaucracy_signal: 0.8, bureaucracy_signal: 0.6}
      C:
        text: "Смешанный подход: ищем и виновных, и решение причины."
        paei: {I: 2.0}
        traits: {root_cause_orientation: 1.0, blame_culture: 0.5}
        stage_signals: {youth_signal: 0.3, stability_signal: 0.2}
      D:
        text: "Фокус на исправлении системы и причины: «что меняем, чтобы не повторялось»."
        paei: {I: 3.0, A: 0.4}
        traits: {root_cause_orientation: 2.0, conflict_constructiveness: 0.8}
        stage_signals: {prime_signal: 0.8, bureaucracy_signal: -0.9}
