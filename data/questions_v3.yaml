        traits: {meeting_effectiveness: 1.2}
        stage_signals: {early_prime_signal: 0.3, youth_signal: 0.2}
      C:
        text: "Нерегулярно или превращается в «поговорили и разошлись»."
        paei: {I: 1.0}
        traits: {meeting_effectiveness: 0.5, weak_formalization: 0.5}
        stage_signals: {gogo_signal: 0.4, youth_signal: 0.3}
      D:
        text: "Встречи — поле политики/борьбы, решений и выполнения мало."
        paei: {I: 0.0}
        traits: {meeting_effectiveness: 0.0, political_behavior: 1.2, blame_culture: 0.6}
        stage_signals: {aristocracy_signal: 0.6, early_bureaucracy_signal: 0.7, prime_signal: -0.8}

  - id: I6
